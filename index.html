<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Buteco Premium Rádio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(#1a1a1a, #000);
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    header {
      background: #111;
      padding: 30px;
    }
    h1 {
      margin: 0;
      font-size: 32px;
    }
    .player {
      margin: 40px 0;
    }
    .btn {
      display: inline-block;
      padding: 15px 25px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      margin-top: 20px;
    }
    #musica {
      margin-top: 20px;
      font-size: 20px;
      color: #f1c40f;
    }
    footer {
      background: #111;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>🍻 Buteco Premium Rádio</h1>
  <p>Sertanejo de verdade, com alma de boteco</p>
</header>

<div class="player">
  <h2>🎧 AO VIVO</h2>

  <audio controls autoplay>
    <source src="https://stm.igng.com.br:7018/stream" type="audio/mpeg">
  </audio>

  <div id="musica">🎶 Carregando música...</div>

  <a class="btn" href="https://wa.me/5599999999999?text=Quero%20pedir%20uma%20música%20no%20Buteco%20Premium" target="_blank">
    📲 Pedir Música
  </a>
</div>

<footer>
  <p>© 2026 Buteco Premium Rádio</p>
</footer>

<!-- API MÚSICA -->
<script>
async function carregarMusica() {
  try {
    const res = await fetch('https://api.allorigins.win/raw?url=http://igng.com.br/api/NzAxOCsx');
    const texto = await res.text();

    document.getElementById("musica").innerHTML =
      "🎧 Tocando agora: " + texto;

  } catch (e) {
    document.getElementById("musica").innerHTML =
      "⚠️ Erro ao carregar música";
  }
}

setInterval(carregarMusica, 10000);
carregarMusica();
</script>

</html>
