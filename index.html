<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site em Manutenção</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0d1b2a;
      color: #fff;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #ff7b00;
      font-size: 3em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2em;
      margin: 10px 0;
    }
    .button {
      background-color: #ff7b00;
      color: #fff;
      padding: 15px 30px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
      margin-top: 20px;
    }
    .footer {
      margin-top: 50px;
      font-size: 0.9em;
      color: #ccc;
    }
    img {
      max-width: 600px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <h1>SITE EM MANUTENÇÃO</h1>
  <p>Estamos trabalhando para deixar tudo pronto!</p>
  <p>Voltaremos em breve. Obrigado pela sua paciência.</p>
  <button class="button">VOLTAR EM BREVE</button>
  <br>
  <img src="manutencao.jpg" alt="Ilustração de site em manutenção">
  <div class="footer">
    <p>Email: contato@seudominio.com | Horário: 09:00 - 18:00</p>
    <p>Siga-nos nas redes sociais: Facebook | Instagram | Twitter</p>
  </div>

</html>
